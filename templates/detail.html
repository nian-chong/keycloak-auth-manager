<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ domain }} 详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media (max-width: 576px) {
            h2 { font-size: 18px; word-break: break-all; }
            .card { margin: 0 -15px; border-radius: 0; }
            pre { font-size: 10px; overflow-x: auto; }
            code { font-size: 11px; word-break: break-all; }
        }
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body class="bg-light">
<div class="container-fluid px-3 mt-4">
    <h2>🔍 {{ domain }}</h2>
    <a href="/" class="btn btn-outline-secondary mb-3">← 返回列表</a>
    
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-dark text-white">认证配置</div>
        <div class="card-body p-0">
            <table class="table table-striped mb-0">
                <tr><th class="ps-3">Client ID</th><td>{{ auth.client_id }}</td></tr>
                <tr><th class="ps-3">Client Secret</th><td><code class="user-select-all">{{ auth.client_secret }}</code></td></tr>
                <tr><th class="ps-3">Cookie Secret</th><td><code class="user-select-all">{{ auth.cookie_secret }}</code></td></tr>
                <tr><th class="ps-3">OAuth 端口</th><td>{{ auth.oauth_port }}</td></tr>
                <tr><th class="ps-3">容器名</th><td>{{ auth.container_name }}</td></tr>
                <tr><th class="ps-3">容器状态</th><td><span class="badge bg-{% if 'Up' in auth.status %}success{% else %}danger{% endif %}">{{ auth.status }}</span></td></tr>
                <tr><th class="ps-3">创建时间</th><td>{{ auth.created_at }}</td></tr>
            </table>
        </div>
    </div>
    
    <div class="card shadow-sm">
        <div class="card-header">Nginx 配置片段</div>
        <div class="card-body">
            <pre class="bg-dark text-success p-3 rounded"><small>{{ auth.nginx_config }}</small></pre>
            <button class="btn btn-outline-secondary btn-sm" onclick="navigator.clipboard.writeText(document.querySelector('pre').textContent)">📋 复制配置</button>
        </div>
    </div>
    
    <form action="/delete/{{ domain }}" method="post" class="mt-4">
        <button class="btn btn-danger w-100">🗑️ 删除此认证</button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
